name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard static route collisions
        run: python3 scripts/check_route_basename_collisions.py
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Build and test backend
        run: cd api && mvn verify -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        run: cd web && npm ci && npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /root/projects/hookwatch
            git pull origin main
            docker compose build api --no-cache
            docker compose up -d --no-deps api
            echo "Waiting for API startup..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}s"
                exit 0
              fi
              sleep 1
            done
            echo "Health check failed after 30s"
            exit 1

      - name: Verify production
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://hookwatch.adrianovs.net/api/v1/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production verified: HTTP 200"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
            sleep 3
          done
          echo "Production verification failed"
          exit 1
