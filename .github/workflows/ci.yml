name: CI/CD

on:
  push:
    branches: [main, "feat/**", "improve/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard static route collisions
        run: python3 scripts/check_route_basename_collisions.py
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Build and test
        run: cd api && mvn verify -q

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard static route collisions
        run: python3 scripts/check_route_basename_collisions.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: cd web && npm ci
      - name: Build
        run: cd web && npm run build

  deploy:
    name: Deploy to VPS
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /root/projects/hookwatch

            # Tag current image for rollback
            docker tag hookwatch-api:latest hookwatch-api:previous 2>/dev/null || true

            # Pull and rebuild
            git pull origin main
            docker compose build api --no-cache

            # Stop and remove conflicting containers, then start fresh
            docker compose stop api 2>/dev/null || true
            docker compose rm -f api 2>/dev/null || true
            docker compose up -d --no-deps api

            # Wait for startup
            sleep 15

            # Health check with retry
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i failed, waiting 10s..."
              sleep 10
            done

            # Rollback on failure
            echo "DEPLOY FAILED - rolling back"
            docker tag hookwatch-api:previous hookwatch-api:latest
            docker compose up -d --no-deps api
            exit 1
